name: Release Debug APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Rename APK
        run: |
          APK="$(find app/build/outputs/apk/debug -type f -name '*.apk' | head -n 1)"
          cp "$APK" "opencode-debug-${GITHUB_REF_NAME}.apk"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          gh release create "$GITHUB_REF_NAME" "opencode-debug-${GITHUB_REF_NAME}.apk" \
            --repo "$REPO" \
            --target "$GITHUB_SHA" \
            --title "OpenCode APK ${GITHUB_REF_NAME}" \
            --notes "Debug APK built from tag ${GITHUB_REF_NAME}."
